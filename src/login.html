<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledgerly — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117; color: #e6edf3; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #161b22; border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; padding: 40px; width: 400px; max-width: 95vw;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #7d8590; margin-bottom: 32px; }
    label { display: block; font-size: 12px; color: #9198a1; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; background: #21262d; border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px; color: #e6edf3; padding: 10px 14px; font-size: 14px;
      outline: none; transition: border-color .2s; margin-bottom: 16px;
    }
    input:focus { border-color: rgba(63,185,80,.5); box-shadow: 0 0 0 3px rgba(63,185,80,.15); }
    .btn {
      width: 100%; padding: 11px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; font-family: inherit; transition: opacity .2s;
    }
    .btn-primary { background: linear-gradient(135deg,#238636,#3fb950); color: #fff; margin-bottom: 10px; }
    .btn-primary:hover { opacity: .9; }
    .btn-magic { background: #21262d; color: #e6edf3; border: 1px solid rgba(255,255,255,.08); }
    .btn-magic:hover { background: #2d333b; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: #7d8590; font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08); }
    .status { font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }
    .error { color: #f85149; }
    .success { color: #3fb950; }
    .toggle { text-align: center; margin-top: 20px; font-size: 13px; color: #7d8590; }
    .toggle a { color: #58a6ff; cursor: pointer; text-decoration: none; }
    .toggle a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Ledgerly</div>
  <div class="subtitle" id="mode-subtitle">Sign in to your account</div>

  <div id="form-signin">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn btn-primary" onclick="signIn()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn btn-magic" onclick="magicLink()">Send Magic Link</button>
    <div class="status" id="status"></div>
    <div class="toggle">No account? <a onclick="switchMode('signup')">Create one</a></div>
  </div>

  <div id="form-signup" style="display:none">
    <label>Email</label>
    <input type="email" id="email2" placeholder="you@example.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="password2" placeholder="8+ characters" autocomplete="new-password">
    <button class="btn btn-primary" onclick="signUp()">Create Account</button>
    <div class="status" id="status2"></div>
    <div class="toggle">Already have one? <a onclick="switchMode('signin')">Sign in</a></div>
  </div>

  <div id="form-magic-sent" style="display:none">
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:32px;margin-bottom:12px">📬</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:8px">Check your email</div>
      <div style="font-size:13px;color:#7d8590">We sent a sign-in link to <strong id="magic-email" style="color:#e6edf3"></strong></div>
    </div>
    <div class="toggle"><a onclick="switchMode('signin')">← Back to sign in</a></div>
  </div>
</div>

<script>
  // Define UI functions immediately — before any async CDN load — so clicks always work
  function switchMode(mode) {
    document.getElementById('form-signin').style.display       = mode === 'signin' ? '' : 'none';
    document.getElementById('form-signup').style.display       = mode === 'signup' ? '' : 'none';
    document.getElementById('form-magic-sent').style.display   = mode === 'magic'  ? '' : 'none';
    document.getElementById('mode-subtitle').textContent =
      mode === 'signup' ? 'Create your Ledgerly account' : 'Sign in to your account';
  }
</script>
<script>
  // Direct REST API calls — no SDK dependency
  // Values injected by server at /login route; no hardcoded fallbacks
  const SUPABASE_URL = window.__SUPABASE_URL__ || '';
  const SUPABASE_KEY = window.__SUPABASE_ANON_KEY__ || '';
  if (!SUPABASE_URL || !SUPABASE_KEY) {
    document.querySelector('.subtitle').textContent = 'Configuration error — please access this page via the server.';
  }

  function sbFetch(endpoint, body) {
    return fetch(SUPABASE_URL + '/auth/v1/' + endpoint, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(r => r.json());
  }

  // Handle magic link callback — extract token from hash fragment
  if (window.location.hash) {
    const params = new URLSearchParams(window.location.hash.slice(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const expiresIn = params.get('expires_in');
    if (accessToken) {
      sessionStorage.setItem('sb_token', accessToken);
      if (refreshToken) sessionStorage.setItem('sb_refresh', refreshToken);
      if (expiresIn) sessionStorage.setItem('sb_expires_at', (Date.now() + parseInt(expiresIn) * 1000).toString());
      window.location.href = 'app.html';
    }
  }
  // Check for existing session on load
  const savedToken = sessionStorage.getItem('sb_token');
  if (savedToken) window.location.href = 'app.html';

  function setStatus(id, msg, type) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.className = 'status ' + (type || ''); }
  }

  async function signIn() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return setStatus('status', 'Please enter email and password.', 'error');
    setStatus('status', 'Signing in…', '');
    const data = await sbFetch('token?grant_type=password', { email, password });
    if (data.error || data.error_code) return setStatus('status', data.msg || data.error_description || data.error, 'error');
    sessionStorage.setItem('sb_token', data.access_token);
    if (data.refresh_token) sessionStorage.setItem('sb_refresh', data.refresh_token);
    if (data.expires_in) sessionStorage.setItem('sb_expires_at', (Date.now() + data.expires_in * 1000).toString());
    window.location.href = 'app.html';
  }

  async function signUp() {
    const email    = document.getElementById('email2').value.trim();
    const password = document.getElementById('password2').value;
    if (!email || !password) return setStatus('status2', 'Please enter email and password.', 'error');
    if (password.length < 8) return setStatus('status2', 'Password must be at least 8 characters.', 'error');
    setStatus('status2', 'Creating account…', '');
    const data = await sbFetch('signup', { email, password });
    if (data.error || data.error_code) return setStatus('status2', data.msg || data.error_description || data.error, 'error');
    if (data.access_token) {
      sessionStorage.setItem('sb_token', data.access_token);
      if (data.refresh_token) sessionStorage.setItem('sb_refresh', data.refresh_token);
      if (data.expires_in) sessionStorage.setItem('sb_expires_at', (Date.now() + data.expires_in * 1000).toString());
      window.location.href = 'app.html';
    } else {
      setStatus('status2', 'Check your email to confirm your account, then sign in.', 'success');
    }
  }

  async function magicLink() {
    const email = document.getElementById('email').value.trim();
    if (!email) return setStatus('status', 'Enter your email first.', 'error');
    setStatus('status', 'Sending…', '');
    const data = await sbFetch('otp', { email });
    if (data.error || data.error_code) return setStatus('status', data.msg || data.error, 'error');
    document.getElementById('magic-email').textContent = email;
    switchMode('magic');
  }

  function goToApp() {
    window.location.href = 'app.html';
  }
</script>
</body>
</html>
